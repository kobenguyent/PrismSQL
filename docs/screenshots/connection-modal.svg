<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="40%" style="stop-color:#08081a"/>
      <stop offset="100%" style="stop-color:#100c1f"/>
    </linearGradient>
    <radialGradient id="blob1" cx="25%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:rgba(123,123,234,0.14)"/>
      <stop offset="100%" style="stop-color:rgba(123,123,234,0)"/>
    </radialGradient>
    <radialGradient id="blob2" cx="80%" cy="75%" r="50%">
      <stop offset="0%" style="stop-color:rgba(96,165,250,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(96,165,250,0)"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="24" stdDeviation="40" flood-color="rgba(0,0,0,0.65)"/>
    </filter>
    <clipPath id="modalClip">
      <rect x="175" y="60" width="550" height="500" rx="16"/>
    </clipPath>
    <clipPath id="winClip">
      <rect width="900" height="620" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#winClip)">
    <!-- Background (dimmed app behind) -->
    <rect width="900" height="620" fill="url(#bgGrad)"/>
    <circle cx="200" cy="180" r="300" fill="url(#blob1)"/>
    <circle cx="720" cy="490" r="240" fill="url(#blob2)"/>

    <!-- Dim overlay -->
    <rect width="900" height="620" fill="rgba(0,0,0,0.55)"/>

    <!-- Modal drop shadow -->
    <rect x="175" y="60" width="550" height="500" rx="16" fill="rgba(0,0,0,0.5)" filter="url(#shadow)"/>

    <!-- Modal panel -->
    <g clip-path="url(#modalClip)">
      <rect x="175" y="60" width="550" height="500" fill="rgba(14,14,28,0.88)"/>
      <!-- Glass shimmer top edge -->
      <rect x="175" y="60" width="550" height="1" fill="rgba(255,255,255,0.13)"/>
    </g>
    <rect x="175" y="60" width="550" height="500" rx="16" fill="none" stroke="rgba(123,123,234,0.35)" stroke-width="1.5"/>

    <!-- Modal header -->
    <rect x="175" y="60" width="550" height="56" rx="0" fill="rgba(10,10,22,0.6)"/>
    <rect x="175" y="115" width="550" height="1" fill="rgba(255,255,255,0.08)"/>
    <!-- Rounded top corners only (cover) -->
    <rect x="175" y="60" width="550" height="16" rx="0" fill="rgba(10,10,22,0.6)"/>
    <rect x="175" y="60" width="550" height="16" rx="16" fill="rgba(10,10,22,0.6)"/>

    <text x="450" y="93" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" font-weight="600" fill="rgba(245,245,250,0.95)" text-anchor="middle" dominant-baseline="middle">New Connection</text>

    <!-- Close button -->
    <circle cx="201" cy="88" r="10" fill="rgba(248,113,113,0.2)" stroke="rgba(248,113,113,0.4)" stroke-width="1"/>
    <text x="201" y="88" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="rgba(248,113,113,0.8)" text-anchor="middle" dominant-baseline="middle">×</text>

    <!-- DB Type selector tabs -->
    <rect x="191" y="127" width="518" height="38" rx="10" fill="rgba(10,10,22,0.6)"/>
    <!-- MySQL tab active -->
    <rect x="195" y="129" width="98" height="34" rx="8" fill="rgba(249,115,22,0.2)" stroke="rgba(249,115,22,0.45)" stroke-width="1"/>
    <text x="244" y="146" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="rgba(249,115,22,0.95)" text-anchor="middle" dominant-baseline="middle">MySQL</text>
    <!-- Other tabs -->
    <text x="340" y="146" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="rgba(245,245,250,0.45)" text-anchor="middle" dominant-baseline="middle">PostgreSQL</text>
    <text x="440" y="146" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="rgba(245,245,250,0.45)" text-anchor="middle" dominant-baseline="middle">SQLite</text>
    <text x="536" y="146" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="rgba(245,245,250,0.45)" text-anchor="middle" dominant-baseline="middle">SQL Server</text>

    <!-- Form fields -->
    <!-- Connection Name -->
    <text x="195" y="188" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="rgba(245,245,250,0.55)">Connection Name</text>
    <rect x="195" y="196" width="518" height="36" rx="8" fill="rgba(22,22,42,0.7)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="211" y="214" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="rgba(245,245,250,0.85)" dominant-baseline="middle">dev-mysql-local</text>

    <!-- Host + Port row -->
    <text x="195" y="248" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="rgba(245,245,250,0.55)">Host</text>
    <text x="575" y="248" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="rgba(245,245,250,0.55)">Port</text>

    <rect x="195" y="256" width="364" height="36" rx="8" fill="rgba(22,22,42,0.7)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="211" y="274" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="rgba(245,245,250,0.85)" dominant-baseline="middle">localhost</text>

    <rect x="573" y="256" width="140" height="36" rx="8" fill="rgba(22,22,42,0.7)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="589" y="274" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="rgba(245,245,250,0.85)" dominant-baseline="middle">3306</text>

    <!-- Username + Password row -->
    <text x="195" y="308" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="rgba(245,245,250,0.55)">Username</text>
    <text x="460" y="308" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="rgba(245,245,250,0.55)">Password</text>

    <rect x="195" y="316" width="248" height="36" rx="8" fill="rgba(22,22,42,0.7)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="211" y="334" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="rgba(245,245,250,0.85)" dominant-baseline="middle">root</text>

    <rect x="457" y="316" width="256" height="36" rx="8" fill="rgba(22,22,42,0.7)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="473" y="334" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="rgba(245,245,250,0.45)" dominant-baseline="middle">••••••••••</text>

    <!-- Database -->
    <text x="195" y="368" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="rgba(245,245,250,0.55)">Database (optional)</text>
    <rect x="195" y="376" width="518" height="36" rx="8" fill="rgba(22,22,42,0.7)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="211" y="394" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="rgba(245,245,250,0.85)" dominant-baseline="middle">myapp</text>

    <!-- SSL toggle -->
    <text x="195" y="430" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="rgba(245,245,250,0.55)">SSL / TLS</text>
    <rect x="195" y="436" width="40" height="22" rx="11" fill="rgba(123,123,234,0.25)" stroke="rgba(123,123,234,0.4)" stroke-width="1"/>
    <circle cx="206" cy="447" r="8" fill="rgba(245,245,250,0.5)"/>
    <text x="245" y="447" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="rgba(245,245,250,0.45)" dominant-baseline="middle">Disabled</text>

    <!-- Action buttons -->
    <!-- Test connection -->
    <rect x="195" y="478" width="148" height="36" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="269" y="496" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="rgba(245,245,250,0.7)" text-anchor="middle" dominant-baseline="middle">Test Connection</text>

    <!-- Test result badge -->
    <rect x="351" y="484" width="120" height="24" rx="6" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.4)" stroke-width="1"/>
    <text x="411" y="496" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="rgba(74,222,128,0.95)" text-anchor="middle" dominant-baseline="middle">✓ Connected!</text>

    <!-- Cancel -->
    <rect x="565" y="478" width="68" height="36" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="599" y="496" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="rgba(245,245,250,0.6)" text-anchor="middle" dominant-baseline="middle">Cancel</text>
    <!-- Save -->
    <rect x="641" y="478" width="72" height="36" rx="8" fill="rgba(123,123,234,0.85)"/>
    <text x="677" y="496" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle" dominant-baseline="middle">Save</text>

    <!-- Window border glow -->
    <rect x="0" y="0" width="900" height="620" rx="12" fill="none" stroke="rgba(123,123,234,0.12)" stroke-width="1.5"/>
  </g>
</svg>

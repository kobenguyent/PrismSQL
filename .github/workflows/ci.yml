name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Skip postinstall scripts; tests mock all DB drivers so native modules are not needed
      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test

  build:
    name: Build (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: linux
            artifact_path: dist/*.AppImage dist/*.deb
          - os: macos-latest
            artifact_name: mac
            artifact_path: dist/*.dmg dist/*.zip
          - os: windows-latest
            artifact_name: windows
            artifact_path: dist/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Skip postinstall to avoid compiling native modules against Node.js headers;
      # electron-rebuild below recompiles them against the correct Electron headers.
      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build and package
        run: npm run package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prismsql-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: warn
          retention-days: 30

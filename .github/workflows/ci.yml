name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Skip postinstall scripts; tests mock all DB drivers so native modules are not needed
      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test

  e2e-visualizer:
    name: E2E Visualizer Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run schema visualizer E2E test
        run: npm run test:e2e:visualizer

  build:
    name: Build (${{ matrix.os }})
    needs: [test, e2e-visualizer]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Skip postinstall to avoid compiling native modules against Node.js headers;
      # electron-rebuild below recompiles them against the correct Electron headers.
      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build and package
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Allow ad-hoc signing (identity: "-") in macOS CI builds.
          # CSC_FOR_PULL_REQUEST only affects signing; no certificate secrets are exposed.
          CSC_FOR_PULL_REQUEST: ${{ matrix.os == 'macos-latest' && 'true' || '' }}

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: kobeansql-linux
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: warn
          retention-days: 30

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: kobeansql-mac
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn
          retention-days: 30

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: kobeansql-windows
          path: dist/*.exe
          if-no-files-found: warn
          retention-days: 30

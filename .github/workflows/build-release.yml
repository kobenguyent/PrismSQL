name: Build Release

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: write

jobs:
  resolve-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name }}
    steps:
      - name: Resolve released tag
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          latest_tag="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq '.tagName')"
          latest_published_at="$(gh release view --repo "$GITHUB_REPOSITORY" --json publishedAt --jq '.publishedAt')"
          run_created_at="${{ github.event.workflow_run.created_at }}"

          if [ -z "$latest_tag" ] || [ "$latest_published_at" = "null" ]; then
            echo "tag_name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$(date -d "$latest_published_at" +%s)" -lt "$(date -d "$run_created_at" +%s)" ]; then
            echo "No release published by triggering run; skipping build."
            echo "tag_name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "tag_name=$latest_tag" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-release
    if: ${{ needs.resolve-release.outputs.tag_name != '' }}
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Skip postinstall to avoid compiling native modules against Node.js headers;
      # electron-rebuild below recompiles them against the correct Electron headers.
      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build and package
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Allow ad-hoc signing (identity: "-") in macOS CI builds.
          CSC_FOR_PULL_REQUEST: ${{ matrix.os == 'macos-latest' && 'true' || '' }}

      - name: Upload release assets (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          for f in dist/*.AppImage dist/*.deb; do
            [ -f "$f" ] && gh release upload "${{ needs.resolve-release.outputs.tag_name }}" "${f}" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          for f in dist/*.dmg dist/*.zip; do
            [ -f "$f" ] && gh release upload "${{ needs.resolve-release.outputs.tag_name }}" "${f}" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem dist\*.exe | ForEach-Object {
            gh release upload "${{ needs.resolve-release.outputs.tag_name }}" $_.FullName --clobber
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

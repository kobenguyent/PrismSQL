name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Skip postinstall to avoid compiling native modules against Node.js headers;
      # electron-rebuild below recompiles them against the correct Electron headers.
      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build and package
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Allow ad-hoc signing (identity: "-") in macOS CI builds.
          CSC_FOR_PULL_REQUEST: ${{ matrix.os == 'macos-latest' && 'true' || '' }}

      - name: Upload release assets (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          for f in dist/*.AppImage dist/*.deb; do
            [ -f "$f" ] && gh release upload "${{ github.event.release.tag_name }}" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          for f in dist/*.dmg dist/*.zip; do
            [ -f "$f" ] && gh release upload "${{ github.event.release.tag_name }}" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem dist\*.exe | ForEach-Object {
            gh release upload "${{ github.event.release.tag_name }}" $_.FullName --clobber
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

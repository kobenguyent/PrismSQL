name: Secret Scan

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  betterleaks:
    name: Betterleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository for secrets
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/betterleaks/betterleaks:latest \
            dir /repo --redact
